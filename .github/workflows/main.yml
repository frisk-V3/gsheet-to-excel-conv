name: Manual Build EXE

on:
  workflow_dispatch: # これで「Run workflow」ボタンが出現します

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openpyxl # 必要に応じて追加

      - name: Build EXE with PyInstaller
        run: |
          # --onefile: 1つのEXEに集約
          # --console: 実行時のログを見せる（不要なら--noconsole）
          pyinstaller --onefile --console --name "Excel_CSV_Fixer" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Excel_CSV_Fixer_EXE
          path: dist/Excel_CSV_Fixer.exe
          retention-days: 1 # 1日（最短）で自動消去してサーバーに優しく

      - name: Success Message
        shell: bash
        run: |
          echo "------------------------------------------------------------"
          echo "✅ ビルドが正常に完了しました！"
          echo "Summary画面の一番下にある 'Artifacts' からZIPを落としてください。"
          echo "解凍後、そのEXEを手動でReleaseにアップロードすれば完了です。"
          echo "------------------------------------------------------------"
